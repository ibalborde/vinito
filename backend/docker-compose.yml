services:
  postgres:
    image: postgres:16-alpine
    container_name: vinito_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: vinito
      POSTGRES_PASSWORD: vinito_dev_password
      POSTGRES_DB: vinito_development
    ports:
      - "5432:5432"
    volumes:
      - vinito_postgres_data:/var/lib/postgresql/data

  adminer:
    image: adminer:latest
    container_name: vinito_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  vinito_postgres_data:
